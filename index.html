<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>巫拉麵</title>
  <link rel="stylesheet" href="Assets/styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="counter">
      <header class="topbar" aria-label="遊戲狀態">
        <div>
          <h1>巫拉麵</h1>
          <p class="subtitle">照訂單煮麵，上錯會扣時間。</p>
        </div>
        <div class="stats">
          <div><span>分數</span><strong id="score">0</strong></div>
          <div><span>連擊</span><strong id="combo">0</strong></div>
          <div><span>時間</span><strong id="time">60</strong></div>
        </div>
      </header>

      <section class="service-line" aria-label="拉麵店櫃台">
        <img id="finishEffect" class="finish-effect" src="Assets/完食.png" alt="" aria-hidden="true">

        <div class="success-log" id="successLog" aria-label="成功出餐紀錄">
          <div class="success-log-track" id="successLogTrack"></div>
        </div>

        <div class="customer-panel">
          <div class="customer" id="customer">
            <img class="customer-art" src="Assets/yume.png" alt="遊戲角色">
            <img id="dontLikeEffect" class="reaction-pop dont-like-pop" src="Assets/DontLike-effect.png" alt="" aria-hidden="true">
          </div>
          <div class="speech-stack">
            <div class="speech">
              <span class="label">客人點單</span>
              <h2 id="orderTitle">準備中</h2>
              <p id="orderText">按「開始」接第一張單。</p>
            </div>
          </div>
        </div>

        <img class="chopsticks-holder" src="Assets/Chopsticks-display.png" alt="筷子筒">

        <div class="bowl-area">
          <div class="steam"><span></span><span></span><span></span></div>
          <div class="bowl" aria-label="目前拉麵">
            <img id="bowlImage" class="bowl-image" src="Assets/Miso-bowl.png" alt="拉麵湯頭">
            <div class="bowl-toppings" aria-hidden="true">
              <img class="bowl-topping bowl-topping-nori" data-bowl-topping="nori" src="Assets/nori-card.png" alt="">
              <img class="bowl-topping bowl-topping-pork" data-bowl-topping="pork" src="Assets/chashu-card.png" alt="">
              <img class="bowl-topping bowl-topping-corn" data-bowl-topping="corn" src="Assets/corn-card.png" alt="">
              <img class="bowl-topping bowl-topping-egg" data-bowl-topping="egg" src="Assets/soft-boiled-egg-card.png" alt="">
            </div>
            <img id="likeEffect" class="reaction-pop like-pop" src="Assets/Like-effect.png" alt="" aria-hidden="true">
            <img id="dropEffect" class="drop-effect" src="Assets/落便.png" alt="" aria-hidden="true">
          </div>
          <div class="current-order" id="currentOrder">空碗</div>
        </div>
      </section>

      <section class="controls" aria-label="料理操作">
        <div class="station broth-station">
          <h3>湯底</h3>
          <button class="choice broth-choice" data-broth="miso">
            <img class="broth-icon" src="Assets/Miso.png" alt="">
            <span class="choice-label"><b>1</b>味噌</span>
          </button>
          <button class="choice broth-choice" data-broth="shoyu">
            <img class="broth-icon" src="Assets/soy%20sauce.png" alt="">
            <span class="choice-label"><b>2</b>醬油</span>
          </button>
          <button class="choice broth-choice" data-broth="tonkotsu">
            <img class="broth-icon" src="Assets/pork%20bone.png" alt="">
            <span class="choice-label"><b>3</b>豚骨</span>
          </button>
        </div>
        <div class="station topping-station">
          <h3>配料</h3>
          <button class="choice topping-choice" data-topping="egg">
            <img class="topping-icon" src="Assets/soft-boiled-egg-card.png" alt="">
            <span class="choice-label"><b>Q</b>溏心蛋</span>
          </button>
          <button class="choice topping-choice" data-topping="pork">
            <img class="topping-icon" src="Assets/chashu-card.png" alt="">
            <span class="choice-label"><b>W</b>叉燒</span>
          </button>
          <button class="choice topping-choice" data-topping="corn">
            <img class="topping-icon" src="Assets/corn-card.png" alt="">
            <span class="choice-label"><b>E</b>玉米</span>
          </button>
          <button class="choice topping-choice" data-topping="nori">
            <img class="topping-icon" src="Assets/nori-card.png" alt="">
            <span class="choice-label"><b>A</b>海苔</span>
          </button>
        </div>
        <div class="station actions">
          <h3>出餐</h3>
          <button id="serveBtn" class="serve"><b>Space</b>送出</button>
          <button id="clearBtn" class="secondary">清空</button>
          <button id="startBtn" class="start">開始</button>
          <div class="bgm-controls" aria-label="BGM控制">
            <button id="bgmToggleBtn" class="bgm-button" type="button">BGM OFF</button>
            <button id="bgmSwitchBtn" class="bgm-button" type="button">更換BGM</button>
          </div>
        </div>
      </section>

      <footer class="message" id="message">選好湯底與配料後送出。</footer>
    </section>
  </main>
  <audio id="bgMusic" src="Assets/SE/Ramen%20shop%20music1.mp3" preload="auto" loop></audio>
  <script src="Source/app.js"></script>
</body>
</html>
